<!DOCTYPE html>
<!--
  人选天选论 - 管理后台
  ========================
  单文件SPA管理后台，功能包括：
  1. 数据看板 - 核心指标统计 + IP地域分布可视化
  2. 文章管理 - 富文本编辑器(WangEditor) + 定时发布 + 金句管理
  3. 用户管理 - 用户列表 + 手机号脱敏 + IP地区 + 活跃统计

  认证方式：Basic Auth（用户名密码在.env中配置）
  技术依赖：WangEditor 5.x CDN

  [安全修复] 移除所有内联事件处理器（onclick等），改用 addEventListener
  以符合 CSP script-src-attr 'none' 策略
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人选天选论 · 管理后台</title>
  <!-- WangEditor 富文本编辑器 -->
  <link href="https://unpkg.com/@wangeditor/editor@5.1.23/dist/css/style.css" rel="stylesheet">
  <style>
    :root {
      --bg: #F7F4ED;
      --card: #FFFFFF;
      --text: #2C2C2C;
      --text-secondary: #8A8A8A;
      --text-hint: #B8B0A8;
      --primary: #3A4A5C;
      --accent: #C84B31;
      --success: #5B8C7A;
      --border: #E0DCD4;
      --stone: #8B6F4E;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* ===== 布局 ===== */
    .app { display: flex; min-height: 100vh; }

    .sidebar {
      width: 220px;
      background: var(--primary);
      color: #fff;
      padding: 24px 0;
      flex-shrink: 0;
    }

    .sidebar-title {
      font-size: 16px;
      font-weight: 600;
      padding: 0 24px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      letter-spacing: 2px;
    }

    .sidebar-menu { list-style: none; margin-top: 16px; }

    .sidebar-menu li {
      padding: 12px 24px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
      border-left: 3px solid transparent;
    }

    .sidebar-menu li:hover { background: rgba(255,255,255,0.08); }
    .sidebar-menu li.active {
      background: rgba(255,255,255,0.12);
      border-left-color: #fff;
    }

    .main { flex: 1; padding: 24px 32px; overflow-y: auto; }

    .page-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--primary);
    }

    /* ===== 卡片 ===== */
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .card-title {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    /* ===== 统计卡片 ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .stat-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 700; color: var(--primary); }
    .stat-sub { font-size: 12px; color: var(--text-hint); margin-top: 4px; }

    /* ===== IP分布条形图 ===== */
    .ip-bar-chart { margin-top: 8px; }
    .ip-bar-item { display: flex; align-items: center; margin-bottom: 8px; }
    .ip-bar-label { width: 80px; font-size: 13px; color: var(--text); text-align: right; padding-right: 12px; flex-shrink: 0; }
    .ip-bar-track { flex: 1; height: 24px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .ip-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--success)); border-radius: 4px; transition: width 0.6s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; min-width: 30px; }
    .ip-bar-count { font-size: 11px; color: #fff; font-weight: 600; }

    /* ===== 表格 ===== */
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
    th { color: var(--text-secondary); font-weight: 500; font-size: 13px; }
    tr:hover { background: rgba(0,0,0,0.02); }

    /* ===== 按钮 ===== */
    .btn {
      display: inline-block;
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-danger { background: var(--accent); color: #fff; }
    .btn-danger:hover { opacity: 0.9; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .btn-sm { padding: 4px 12px; font-size: 12px; }

    /* ===== 表单 ===== */
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--primary); }
    .form-textarea { min-height: 200px; resize: vertical; font-family: inherit; }

    .form-row { display: flex; gap: 16px; }
    .form-row .form-group { flex: 1; }

    /* ===== 模态框 ===== */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: var(--card);
      border-radius: 16px;
      padding: 32px;
      width: 90%;
      max-width: 900px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 24px; color: var(--primary); }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }

    /* ===== 富文本编辑器容器 ===== */
    .editor-container {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .editor-container .w-e-toolbar { border-bottom: 1px solid var(--border) !important; }
    .editor-container .w-e-text-container { min-height: 300px !important; }

    /* ===== 标签 ===== */
    .tag {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
    }
    .tag-published { background: rgba(91,140,122,0.12); color: var(--success); }
    .tag-draft { background: rgba(138,138,138,0.12); color: var(--text-secondary); }
    .tag-scheduled { background: rgba(200,75,49,0.12); color: var(--accent); }

    /* ===== 空状态 ===== */
    .empty { text-align: center; padding: 48px; color: var(--text-hint); }

    /* ===== 登录页 ===== */
    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }

    .login-box {
      background: var(--card);
      border-radius: 16px;
      padding: 48px 40px;
      width: 380px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .login-box h1 {
      font-size: 22px;
      color: var(--primary);
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .login-box p { font-size: 13px; color: var(--text-hint); margin-bottom: 32px; }

    #loginError { color: var(--accent); font-size: 13px; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- WangEditor 富文本编辑器核心库 -->
  <script src="https://unpkg.com/@wangeditor/editor@5.1.23/dist/index.js"></script>

  <script>
    /**
     * ===== 全局状态 =====
     */
    const API_BASE = window.location.protocol === 'https:' ? window.location.origin.replace('https:', 'http:') : '';
    let authHeader = '';
    let currentPage = 'dashboard';
    let editorInstance = null; // WangEditor 实例引用

    /**
     * ===== 事件委托 =====
     * [安全修复] 使用事件委托替代所有内联 onclick 事件处理器
     * 这样可以符合 CSP script-src-attr 'none' 策略
     */
    document.addEventListener('click', function(e) {
      const target = e.target.closest('[data-action]');
      if (!target) return;

      const action = target.getAttribute('data-action');
      const param = target.getAttribute('data-param') || '';

      switch (action) {
        case 'login': doLogin(); break;
        case 'logout': doLogout(); break;
        case 'navigate': navigate(param); break;
        case 'new-article': showArticleModal(); break;
        case 'edit-article': editArticle(param); break;
        case 'delete-article': deleteArticle(param); break;
        case 'save-article': saveArticle(param); break;
        case 'close-modal': closeArticleModal(); break;
        case 'toggle-schedule': toggleSchedule(); break;
        default: break;
      }
    });

    /**
     * 监听 change 事件（用于 select 元素）
     */
    document.addEventListener('change', function(e) {
      const target = e.target.closest('[data-change]');
      if (!target) return;

      const action = target.getAttribute('data-change');
      if (action === 'toggle-schedule') {
        toggleSchedule();
      }
    });

    /**
     * 监听键盘事件（登录页回车提交）
     */
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const passwordInput = document.getElementById('password');
        const usernameInput = document.getElementById('username');
        if (document.activeElement === passwordInput || document.activeElement === usernameInput) {
          doLogin();
        }
      }
    });

    /**
     * ===== 认证模块 =====
     * 使用 Basic Auth，凭证存储在 localStorage
     */
    function checkAuth() {
      const saved = localStorage.getItem('admin_auth');
      if (saved) {
        authHeader = saved;
        renderApp();
      } else {
        renderLogin();
      }
    }

    function renderLogin() {
      document.getElementById('root').innerHTML =
        '<div class="login-page">' +
          '<div class="login-box">' +
            '<h1>人选天选论</h1>' +
            '<p>管理后台</p>' +
            '<div class="form-group">' +
              '<input class="form-input" id="username" placeholder="管理员账号" />' +
            '</div>' +
            '<div class="form-group">' +
              '<input class="form-input" id="password" type="password" placeholder="管理员密码" />' +
            '</div>' +
            '<button class="btn btn-primary" style="width:100%;padding:12px" data-action="login">登录</button>' +
            '<div id="loginError">账号或密码错误</div>' +
          '</div>' +
        '</div>';
    }

    async function doLogin() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      if (!u || !p) {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginError').textContent = '请输入账号和密码';
        return;
      }
      authHeader = 'Basic ' + btoa(u + ':' + p);

      try {
        const res = await apiFetch('/api/admin/dashboard/overview');
        if (res.code === 0) {
          localStorage.setItem('admin_auth', authHeader);
          renderApp();
        } else {
          document.getElementById('loginError').style.display = 'block';
          document.getElementById('loginError').textContent = '账号或密码错误';
        }
      } catch (e) {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginError').textContent = '登录失败，请检查网络';
      }
    }

    function doLogout() {
      localStorage.removeItem('admin_auth');
      authHeader = '';
      renderLogin();
    }

    /**
     * ===== API 请求封装 =====
     * 统一处理请求头和JSON解析
     */
    async function apiFetch(url, options) {
      options = options || {};
      const res = await fetch(API_BASE + url, {
        method: options.method || 'GET',
        body: options.body || undefined,
        headers: Object.assign({
          'Content-Type': 'application/json',
          'Authorization': authHeader,
        }, options.headers || {}),
      });
      if (res.status === 401) {
        doLogout();
        throw new Error('认证失败');
      }
      return res.json();
    }

    /**
     * ===== 主布局渲染 =====
     */
    function renderApp() {
      // 销毁旧的编辑器实例，防止内存泄漏
      destroyEditor();

      var dashboardActive = currentPage === 'dashboard' ? ' active' : '';
      var articlesActive = currentPage === 'articles' ? ' active' : '';
      var usersActive = currentPage === 'users' ? ' active' : '';

      document.getElementById('root').innerHTML =
        '<div class="app">' +
          '<div class="sidebar">' +
            '<div class="sidebar-title">人选天选论</div>' +
            '<ul class="sidebar-menu">' +
              '<li class="' + dashboardActive + '" data-action="navigate" data-param="dashboard">📊 数据看板</li>' +
              '<li class="' + articlesActive + '" data-action="navigate" data-param="articles">📝 文章管理</li>' +
              '<li class="' + usersActive + '" data-action="navigate" data-param="users">👥 用户管理</li>' +
              '<li data-action="logout">🚪 退出登录</li>' +
            '</ul>' +
          '</div>' +
          '<div class="main" id="mainContent"></div>' +
        '</div>';

      switch (currentPage) {
        case 'dashboard': renderDashboard(); break;
        case 'articles': renderArticles(); break;
        case 'users': renderUsers(); break;
      }
    }

    function navigate(page) {
      currentPage = page;
      renderApp();
    }

    /**
     * ===== 数据看板 =====
     * 展示核心指标 + IP地域分布可视化条形图
     */
    async function renderDashboard() {
      var main = document.getElementById('mainContent');
      main.innerHTML = '<div class="page-title">数据看板</div><div>加载中...</div>';

      try {
        var res = await apiFetch('/api/admin/dashboard/overview');
        if (res.code !== 0) { main.innerHTML = '<div class="empty">加载失败</div>'; return; }
      } catch (e) {
        main.innerHTML = '<div class="empty">加载失败：' + escapeHtml(e.message) + '</div>';
        return;
      }

      var d = res.data;
      main.innerHTML =
        '<div class="page-title">数据看板</div>' +
        '<div class="stats-grid">' +
          '<div class="stat-card"><div class="stat-label">总用户数</div><div class="stat-value">' + d.totalUsers + '</div></div>' +
          '<div class="stat-card"><div class="stat-label">今日新增</div><div class="stat-value">' + d.todayNewUsers + '</div></div>' +
          '<div class="stat-card"><div class="stat-label">日活跃</div><div class="stat-value">' + d.dau + '</div></div>' +
          '<div class="stat-card"><div class="stat-label">月活跃</div><div class="stat-value">' + d.mau + '</div></div>' +
          '<div class="stat-card"><div class="stat-label">文章总数</div><div class="stat-value">' + d.totalArticles + '</div></div>' +
          '<div class="stat-card"><div class="stat-label">道痕总数</div><div class="stat-value">' + d.totalDiaries + '</div></div>' +
          '<div class="stat-card"><div class="stat-label">今日道痕</div><div class="stat-value">' + d.todayDiaries + '</div></div>' +
        '</div>' +
        '<div class="card">' +
          '<div class="card-title">IP 地域分布</div>' +
          '<div id="ipChart">加载中...</div>' +
        '</div>';

      // 加载IP分布数据并渲染可视化条形图
      try {
        var ipRes = await apiFetch('/api/admin/dashboard/ip-distribution');
        var ipEl = document.getElementById('ipChart');
        if (ipRes.code === 0 && ipRes.data && ipRes.data.length > 0) {
          var maxCount = Math.max.apply(null, ipRes.data.map(function(i) { return i.count; }));
          var html = '<div class="ip-bar-chart">';
          ipRes.data.forEach(function(item) {
            var pct = Math.max((item.count / maxCount) * 100, 5);
            html +=
              '<div class="ip-bar-item">' +
                '<div class="ip-bar-label">' + escapeHtml(item.region || '未知') + '</div>' +
                '<div class="ip-bar-track">' +
                  '<div class="ip-bar-fill" style="width:' + pct + '%">' +
                    '<span class="ip-bar-count">' + item.count + '</span>' +
                  '</div>' +
                '</div>' +
              '</div>';
          });
          html += '</div>';
          ipEl.innerHTML = html;
        } else {
          ipEl.innerHTML = '<div class="empty">暂无数据</div>';
        }
      } catch (e) {
        var ipEl2 = document.getElementById('ipChart');
        if (ipEl2) ipEl2.innerHTML = '<div class="empty">IP数据加载失败</div>';
      }
    }

    /**
     * ===== 文章管理 =====
     * 支持：新建/编辑/删除文章、富文本编辑器、定时发布
     */
    var articlesList = [];

    async function renderArticles() {
      var main = document.getElementById('mainContent');
      main.innerHTML = '<div class="page-title">文章管理</div><div>加载中...</div>';

      try {
        var res = await apiFetch('/api/admin/articles');
        if (res.code !== 0) { main.innerHTML = '<div class="empty">加载失败</div>'; return; }
      } catch (e) {
        main.innerHTML = '<div class="empty">加载失败</div>';
        return;
      }

      articlesList = res.data.list || [];

      var tableHtml = '';
      if (articlesList.length === 0) {
        tableHtml = '<div class="empty">暂无文章，点击上方按钮创建</div>';
      } else {
        tableHtml = '<table>' +
          '<tr><th>章节</th><th>标题</th><th>状态</th><th>阅读量</th><th>发布时间</th><th>操作</th></tr>';
        articlesList.forEach(function(a) {
          var statusTag = '';
          if (a.status === 'published') {
            statusTag = '<span class="tag tag-published">已发布</span>';
          } else if (a.scheduledAt && new Date(a.scheduledAt) > new Date()) {
            statusTag = '<span class="tag tag-scheduled">定时发布</span>';
          } else {
            statusTag = '<span class="tag tag-draft">草稿</span>';
          }
          tableHtml +=
            '<tr>' +
              '<td>第' + a.chapter + '章</td>' +
              '<td>' + escapeHtml(a.title) + '</td>' +
              '<td>' + statusTag + '</td>' +
              '<td>' + (a.viewCount || 0) + '</td>' +
              '<td>' + (a.publishedAt ? new Date(a.publishedAt).toLocaleDateString() : '-') + '</td>' +
              '<td>' +
                '<button class="btn btn-outline btn-sm" data-action="edit-article" data-param="' + a.id + '">编辑</button> ' +
                '<button class="btn btn-danger btn-sm" data-action="delete-article" data-param="' + a.id + '">删除</button>' +
              '</td>' +
            '</tr>';
        });
        tableHtml += '</table>';
      }

      main.innerHTML =
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">' +
          '<div class="page-title" style="margin-bottom:0">文章管理</div>' +
          '<button class="btn btn-primary" data-action="new-article">+ 新建文章</button>' +
        '</div>' +
        '<div class="card">' + tableHtml + '</div>';
    }

    /**
     * 显示文章编辑弹窗
     * 集成 WangEditor 富文本编辑器
     */
    function showArticleModal(article) {
      article = article || null;
      // 先销毁旧编辑器
      destroyEditor();

      var isEdit = !!article;
      var overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.id = 'articleModal';
      overlay.innerHTML =
        '<div class="modal">' +
          '<div class="modal-title">' + (isEdit ? '编辑文章' : '新建文章') + '</div>' +
          '<div class="form-row">' +
            '<div class="form-group">' +
              '<label class="form-label">章节号</label>' +
              '<input class="form-input" id="artChapter" type="number" value="' + (article ? article.chapter : '') + '" placeholder="如：1" />' +
            '</div>' +
            '<div class="form-group">' +
              '<label class="form-label">状态</label>' +
              '<select class="form-select" id="artStatus" data-change="toggle-schedule">' +
                '<option value="published"' + (article && article.status === 'published' ? ' selected' : '') + '>立即发布</option>' +
                '<option value="draft"' + (article && article.status === 'draft' ? ' selected' : '') + '>草稿</option>' +
                '<option value="scheduled">定时发布</option>' +
              '</select>' +
            '</div>' +
          '</div>' +
          '<div class="form-group" id="scheduleGroup" style="display:none">' +
            '<label class="form-label">定时发布时间</label>' +
            '<input class="form-input" id="artScheduledAt" type="datetime-local" value="" />' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">标题</label>' +
            '<input class="form-input" id="artTitle" value="' + escapeHtml(article ? article.title : '') + '" placeholder="文章标题" />' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">摘要</label>' +
            '<input class="form-input" id="artSummary" value="' + escapeHtml(article ? article.summary : '') + '" placeholder="一句话摘要" />' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">金句（每行一句）</label>' +
            '<textarea class="form-textarea" id="artQuotes" style="min-height:80px" placeholder="每行一句金句">' + (article && article.quotes ? article.quotes.join('\n') : '') + '</textarea>' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">正文内容</label>' +
            '<div class="editor-container">' +
              '<div id="editorToolbar"></div>' +
              '<div id="editorContent" style="min-height:300px"></div>' +
            '</div>' +
          '</div>' +
          '<div class="modal-actions">' +
            '<button class="btn btn-outline" data-action="close-modal">取消</button>' +
            '<button class="btn btn-primary" data-action="save-article" data-param="' + (article ? article.id : '') + '">' + (isEdit ? '保存' : '创建') + '</button>' +
          '</div>' +
        '</div>';
      document.body.appendChild(overlay);

      // 初始化 WangEditor 富文本编辑器
      initEditor(article ? (article.content || '') : '');
    }

    /**
     * 初始化 WangEditor 5.x 富文本编辑器
     */
    function initEditor(initialContent) {
      var E = window.wangEditor;
      if (!E) {
        // WangEditor CDN加载失败，降级为textarea
        console.warn('WangEditor未加载，降级为textarea');
        var container = document.querySelector('.editor-container');
        if (container) {
          container.innerHTML = '<textarea class="form-textarea" id="editorFallback" style="min-height:300px">' + escapeHtml(initialContent) + '</textarea>';
        }
        return;
      }

      // 创建编辑器和工具栏
      var editorConfig = {
        placeholder: '请输入文章正文...',
        onChange: function(editor) {
          // 编辑器内容变化时的回调
        },
      };

      var toolbarConfig = {
        excludeKeys: [
          'group-video', 'insertVideo', 'uploadVideo',
          'insertTable', 'codeBlock', 'todo',
        ],
      };

      var editor = E.createEditor({
        selector: '#editorContent',
        html: initialContent,
        config: editorConfig,
        mode: 'default',
      });

      E.createToolbar({
        editor: editor,
        selector: '#editorToolbar',
        config: toolbarConfig,
        mode: 'default',
      });

      editorInstance = editor;
    }

    /**
     * 销毁编辑器实例，防止内存泄漏
     */
    function destroyEditor() {
      if (editorInstance) {
        try { editorInstance.destroy(); } catch (e) {}
        editorInstance = null;
      }
    }

    /**
     * 获取编辑器内容
     */
    function getEditorContent() {
      if (editorInstance) {
        return editorInstance.getHtml();
      }
      var fallback = document.getElementById('editorFallback');
      return fallback ? fallback.value : '';
    }

    /**
     * 切换定时发布时间输入框的显示/隐藏
     */
    function toggleSchedule() {
      var status = document.getElementById('artStatus').value;
      var group = document.getElementById('scheduleGroup');
      if (group) {
        group.style.display = status === 'scheduled' ? 'block' : 'none';
      }
    }

    function closeArticleModal() {
      destroyEditor();
      var modal = document.getElementById('articleModal');
      if (modal) modal.remove();
    }

    /**
     * 保存文章（新建或编辑）
     */
    async function saveArticle(id) {
      var status = document.getElementById('artStatus').value;
      var data = {
        chapter: parseInt(document.getElementById('artChapter').value),
        title: document.getElementById('artTitle').value,
        summary: document.getElementById('artSummary').value,
        content: getEditorContent(),
        quotes: document.getElementById('artQuotes').value.split('\n').filter(function(q) { return q.trim(); }),
        status: status === 'scheduled' ? 'draft' : status,
      };

      // 定时发布
      if (status === 'scheduled') {
        var scheduledAt = document.getElementById('artScheduledAt').value;
        if (!scheduledAt) {
          alert('请选择定时发布时间');
          return;
        }
        data.scheduledAt = new Date(scheduledAt).toISOString();
      }

      if (!data.title || !data.chapter) {
        alert('请填写章节号和标题');
        return;
      }

      var res;
      try {
        if (id) {
          res = await apiFetch('/api/admin/articles/' + id, { method: 'PUT', body: JSON.stringify(data) });
        } else {
          res = await apiFetch('/api/admin/articles', { method: 'POST', body: JSON.stringify(data) });
        }
      } catch (e) {
        alert('操作失败：' + e.message);
        return;
      }

      if (res.code === 0) {
        closeArticleModal();
        renderArticles();
      } else {
        alert(res.message || '操作失败');
      }
    }

    /**
     * 编辑文章
     */
    async function editArticle(id) {
      var article = articlesList.find(function(a) { return a.id === id; });
      if (article) {
        if (typeof article.quotes === 'string') {
          try { article.quotes = JSON.parse(article.quotes); } catch (e) { article.quotes = []; }
        }
        showArticleModal(article);
      }
    }

    /**
     * 删除文章
     */
    async function deleteArticle(id) {
      if (!confirm('确定要删除这篇文章吗？此操作不可恢复。')) return;
      try {
        var res = await apiFetch('/api/admin/articles/' + id, { method: 'DELETE' });
        if (res.code === 0) {
          renderArticles();
        } else {
          alert(res.message || '删除失败');
        }
      } catch (e) {
        alert('删除失败：' + e.message);
      }
    }

    /**
     * ===== 用户管理 =====
     */
    async function renderUsers() {
      var main = document.getElementById('mainContent');
      main.innerHTML = '<div class="page-title">用户管理</div><div>加载中...</div>';

      try {
        var res = await apiFetch('/api/admin/users');
        if (res.code !== 0) { main.innerHTML = '<div class="empty">加载失败</div>'; return; }
      } catch (e) {
        main.innerHTML = '<div class="empty">加载失败</div>';
        return;
      }

      var users = res.data.list || [];

      var tableHtml = '';
      if (users.length === 0) {
        tableHtml = '<div class="empty">暂无用户</div>';
      } else {
        tableHtml = '<table>' +
          '<tr><th>昵称</th><th>手机号</th><th>连续天数</th><th>日记数</th><th>IP地区</th><th>注册时间</th><th>最后活跃</th></tr>';
        users.forEach(function(u) {
          tableHtml +=
            '<tr>' +
              '<td>' + escapeHtml(u.nickname) + '</td>' +
              '<td>' + maskPhone(u.phone) + '</td>' +
              '<td>' + (u.streakDays || 0) + '天</td>' +
              '<td>' + (u._count && u._count.diaries ? u._count.diaries : (u.diaryCount || 0)) + '篇</td>' +
              '<td>' + escapeHtml(u.lastIpRegion || '未知') + '</td>' +
              '<td>' + new Date(u.createdAt).toLocaleDateString() + '</td>' +
              '<td>' + new Date(u.lastLoginAt || u.createdAt).toLocaleDateString() + '</td>' +
            '</tr>';
        });
        tableHtml += '</table>';
      }

      main.innerHTML =
        '<div class="page-title">用户管理</div>' +
        '<div class="card">' + tableHtml + '</div>';
    }

    /**
     * ===== 工具函数 =====
     */

    /**
     * 手机号脱敏：138****1234
     */
    function maskPhone(phone) {
      if (!phone || phone.length < 7) return phone || '';
      return phone.substring(0, 3) + '****' + phone.substring(7);
    }

    /**
     * HTML转义，防止XSS
     */
    function escapeHtml(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ===== 启动应用 =====
    checkAuth();
  </script>
</body>
</html>
